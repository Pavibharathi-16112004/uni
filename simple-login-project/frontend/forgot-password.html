<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password - UniJourney</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo-circle">U</div>
  <h1>Forgot password</h1>
  <p class="subtitle">Enter your email to get a reset link</p>

  <div class="card">
    <div id="message" class="message"></div>

    <form id="forgotForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <button type="submit" class="submit-btn">Send reset link</button>
    </form>
  </div>

  <p class="footer-text"><a href="index.html">Back to sign in</a></p>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const messageBox = document.getElementById("message");

    document.getElementById("forgotForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;

      try {
        const res = await fetch(`${API_BASE}/api/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        messageBox.textContent = data.message;
        messageBox.className = "message success";
      } catch (err) {
        messageBox.textContent = "Could not reach server. Is FastAPI running?";
        messageBox.className = "message error";
      }
    });
  </script>
</body>
</html>
