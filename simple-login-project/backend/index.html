<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - UniJourney</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo-circle">U</div>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your <b>UniJourney</b> account</p>

  <div class="card">
    <div id="message" class="message"></div>

    <button class="google-btn" type="button" onclick="window.location.href='http://127.0.0.1:8000/api/auth/google'">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.3 0 6.3 1.3 8.6 3.4l5.7-5.7C34.6 3.5 29.6 1.5 24 1.5 11.8 1.5 2 11.3 2 23.5S11.8 45.5 24 45.5c12.1 0 22-9.9 22-22 0-1-.1-2-.4-3z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.2 19 12.5 24 12.5c3.3 0 6.3 1.3 8.6 3.4l5.7-5.7C34.6 6.5 29.6 4.5 24 4.5c-7.4 0-13.7 4.2-16.9 10.3z"/>
        <path fill="#4CAF50" d="M24 45.5c5.4 0 10.4-1.9 14.3-5.1l-6.6-5.4c-2 1.4-4.7 2.3-7.7 2.3-5.3 0-9.7-3.6-11.3-8.4l-6.6 5.1c3.2 6.1 9.5 10.5 18.1 10.5z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.6 5.4C41.7 36.5 44 30.9 44 24c0-1.2-.1-2.4-.4-3.5z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">Or continue with email</div>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <div class="pw-row">
        <label for="password">Password</label>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="••••••••" required>

      <button type="submit" class="submit-btn">Sign in</button>
    </form>
  </div>

  <p class="footer-text">Don't have an account? <a href="signup.html">Sign up</a></p>

  <script src="script.js"></script>
</body>
</html>
