<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password - UniJourney</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo-circle">U</div>
  <h1>Reset password</h1>
  <p class="subtitle">Enter your new password below</p>

  <div class="card">
    <div id="message" class="message"></div>

    <form id="resetForm">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="••••••••" required>

      <button type="submit" class="submit-btn">Reset password</button>
    </form>
  </div>

  <p class="footer-text"><a href="index.html">Back to sign in</a></p>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const messageBox = document.getElementById("message");
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const new_password = document.getElementById("newPassword").value;

      if (!token) {
        messageBox.textContent = "Missing or invalid reset link.";
        messageBox.className = "message error";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password }),
        });
        const data = await res.json();

        if (!res.ok) {
          messageBox.textContent = data.detail || "Reset failed";
          messageBox.className = "message error";
          return;
        }

        messageBox.textContent = data.message;
        messageBox.className = "message success";
      } catch (err) {
        messageBox.textContent = "Could not reach server. Is FastAPI running?";
        messageBox.className = "message error";
      }
    });
  </script>
</body>
</html>
